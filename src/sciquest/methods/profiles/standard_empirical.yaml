id: standard_empirical
display_name: Standard empirical loop
plain_language_label: Standard empirical loop
description: 'A general empirical cycle: state a testable hypothesis, collect or generate
  data, run an experiment, evaluate metrics, and iterate.'
best_for:
- General open-ended empirical research
- Default backwards-compatible SciQuest behavior
bad_for:
- Questions requiring explicit causal identification or formal belief updating
phase_affinities:
- problem_framing
- experiment_design
- evidence_evaluation
hypothesis_generation_rules:
- State a testable claim appropriate to this method.
experiment_design_rules:
- Design the experiment according to this method lens.
evidence_evaluation_rules:
- Evaluate evidence according to this method lens.
validation_rules:
- State success criteria before execution.
journal_sections:
- Method-specific evidence notes
scoring_transform: method_lens_metadata_only_v1
next_step_policy:
- Choose the next step according to method-specific evidence.
failure_modes:
- Method shopping after results are known
- Overclaiming beyond the method lens
incompatible_or_tense_with: []
recommended_pairings:
- bayesian
- strong_inference
- popperian_falsificationist
prompt_addendum: 'A general empirical cycle: state a testable hypothesis, collect
  or generate data, run an experiment, evaluate metrics, and iterate.'
