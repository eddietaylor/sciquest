id: grounded_theory
display_name: Grounded theory
plain_language_label: Build theory from qualitative observations
description: Build concepts and theory from coded observations while documenting saturation
  and memoing.
best_for:
- Qualitative data
- Field notes
- Open coding
bad_for:
- Immediate confirmatory statistical claims
phase_affinities:
- hypothesis_generation
- evidence_evaluation
hypothesis_generation_rules:
- State a testable claim appropriate to this method.
experiment_design_rules:
- Design the experiment according to this method lens.
evidence_evaluation_rules:
- Evaluate evidence according to this method lens.
validation_rules:
- State success criteria before execution.
journal_sections:
- Method-specific evidence notes
scoring_transform: method_lens_metadata_only_v1
next_step_policy:
- Choose the next step according to method-specific evidence.
failure_modes:
- Method shopping after results are known
- Overclaiming beyond the method lens
incompatible_or_tense_with: []
recommended_pairings:
- standard_empirical
prompt_addendum: Build concepts and theory from coded observations while documenting
  saturation and memoing.
